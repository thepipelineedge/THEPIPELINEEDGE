<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Pipeline — NFL Pick'em 2026</title>
<style>
@font-face{font-family:'Bebas Neue';src:url('https://fonts.gstatic.com/s/bebasneue/v9/JTUSjIg69CK48gSG63HxTvEjN_cPYK2o.woff2') format('woff2');font-weight:400;font-display:swap}
@font-face{font-family:'DM Sans';src:url('https://fonts.gstatic.com/s/dmsans/v13/rtemDme5lpS0d1t0/PxIUypg.woff2') format('woff2');font-weight:400;font-display:swap}
:root{--bg:#0d1117;--bg2:#161b24;--bg3:#1e2633;--border:rgba(255,255,255,0.07);--text:#e6edf3;--text2:#8b96a7;--text3:#4e5a6a;--green:#2ea043;--green2:#3fb950;--blue:#1f6feb;--blue2:#388bfd;--amber:#d29922;--amber2:#e3b341;--red:#da3633;--red2:#f85149;--gold:#f0a82e}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:16px;overflow-x:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
.access-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;z-index:2000}
.access-popup{background:linear-gradient(135deg,#1a1f2e 0%,#0f1419 100%);border:3px solid var(--gold);border-radius:20px;padding:40px 30px;max-width:500px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(255,165,0,0.25)}
.access-popup h1{color:#ffffff;font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:.08em;margin-bottom:12px}
.access-popup h1 span{color:var(--gold)}
.access-subtitle{color:var(--text2);font-size:12px;margin-bottom:28px;line-height:1.5}
.tier-boxes{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:24px 0}
.tier-box{border:2px solid var(--gold);border-radius:15px;padding:24px 16px;background:rgba(255,165,0,0.08);cursor:pointer;transition:all .2s}
.tier-box.free{border-color:var(--green2);background:rgba(46,160,67,0.12)}
.tier-box:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(255,165,0,0.2)}
.tier-box.free:hover{box-shadow:0 8px 24px rgba(63,185,80,0.2)}
.tier-icon{font-size:32px;margin-bottom:10px}
.tier-name{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.05em;margin-bottom:6px;color:var(--gold)}
.tier-box.free .tier-name{color:var(--green2)}
.tier-desc{color:var(--text2);font-size:12px;line-height:1.5;margin-bottom:12px}
.tier-price{font-size:10px;color:var(--text3);margin-bottom:12px}
.tier-box.free .tier-price{display:none}
.tier-features{text-align:left;margin:12px 0;font-size:11px;line-height:1.7}
.tier-features div{color:var(--green2);margin-bottom:6px}
.tier-box:not(.free) .tier-features div{color:var(--gold)}
.cta-button{background:linear-gradient(135deg,var(--gold),#ff8c00);color:#000;border:none;border-radius:12px;padding:12px 24px;font-size:12px;font-weight:700;cursor:pointer;width:100%;transition:all .3s;letter-spacing:.05em;text-transform:uppercase}
.tier-box.free .cta-button{background:var(--green2);color:#000}
.cta-button:hover{transform:translateY(-2px);box-shadow:0 12px 24px rgba(255,165,0,0.35)}
.footer-legal{color:var(--text3);font-size:9px;margin-top:20px;line-height:1.5;padding-top:16px;border-top:1px solid var(--border)}
.footer-legal a{color:var(--gold);text-decoration:none}
.paywall-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);display:none;align-items:center;justify-content:center;z-index:1999;padding:20px}
.paywall-content{background:linear-gradient(135deg,#1a1f2e 0%,#0f1419 100%);border:2px solid var(--red2);border-radius:20px;padding:40px;max-width:500px;width:100%;text-align:center}
.paywall-content h2{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:.08em;color:var(--red2);margin-bottom:15px}
.paywall-content p{color:var(--text2);font-size:14px;line-height:1.8;margin-bottom:25px}
.legal-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:16px 28px;padding-bottom:20px}
.legal-card{background:rgba(0,188,212,0.12);border:2px solid #00BCD4;border-radius:8px;padding:14px;color:#00BCD4;overflow-y:auto;max-height:600px}
.legal-card-title{font-size:13px;font-weight:700;margin-bottom:8px;color:#00BCD4}
.legal-card-body{font-size:11px;line-height:1.75;color:#ffffff}
.legal-card-body strong{color:#00BCD4;font-weight:600}
.legal-card-body a{text-decoration:underline;color:#ffffff}
.legal-card-body a:hover{opacity:0.8}
.legal-card-body p{margin-bottom:10px}
.legal-card-body ul{margin-left:16px;margin:10px 0 10px 16px}
.legal-card-body li{margin-bottom:8px;line-height:1.6}
.legal-card-body h4{margin-top:14px;margin-bottom:8px;color:#00BCD4;font-size:12px;font-weight:700}
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:var(--bg2);border-bottom:2px solid var(--gold);position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:14px}
.header-right{display:flex;align-items:center;gap:20px;justify-content:flex-end}
.htitle-main{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.06em}
.htitle-main span{color:var(--gold)}
.htitle-sub{font-size:11px;color:var(--text2);margin-top:1px}
.hlive{display:inline-flex;align-items:center;gap:5px;background:rgba(46,160,67,0.15);border:1px solid rgba(46,160,67,0.35);color:var(--green2);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.hlive::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--green2);animation:glow-pulse 1.5s infinite}
@keyframes glow-pulse{0%{opacity:1;box-shadow:0 0 10px var(--green2);transform:scale(1)}50%{opacity:.5;box-shadow:0 0 4px rgba(63,185,80,.5);transform:scale(.9)}100%{opacity:1;box-shadow:0 0 10px var(--green2);transform:scale(1)}}
.youtube-btn{text-decoration:none;color:#ffffff;font-size:12px;font-weight:600;padding:6px 12px;background:#ff0000;border:1px solid #ff0000;border-radius:4px;transition:.15s;display:inline-flex;align-items:center;gap:6px}
.youtube-btn:hover{background:#cc0000}
.nav-group{background:var(--bg2);border-bottom:1px solid var(--border)}
.nav-label{padding:10px 28px 6px;font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.12em}
.nav{display:flex;padding:0 28px;gap:0;overflow-x:auto;border-bottom:1px solid var(--border);flex-wrap:wrap}
.ntab{padding:12px 20px;color:var(--text2);cursor:pointer;font-size:12px;font-weight:500;border-bottom:3px solid transparent;white-space:nowrap;transition:.2s;background:none;border:none;font-family:inherit}
.ntab:hover{color:var(--text)}
.ntab.active{color:var(--text);border-bottom-color:var(--gold)}
.ntab.auto-tab.active{border-bottom-color:var(--green2)}
.pane{display:none;padding:20px}
.pane.active{display:block}
.stitle{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.05em;margin-bottom:18px;display:flex;align-items:center;gap:10px}
.stitle::after{content:'';flex:1;height:1px;background:var(--border)}
.box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
.box-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:14px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:6px;margin-bottom:16px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;transition:.15s}
.card:hover{border-color:rgba(255,255,255,0.13)}
.card-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.card-val{font-size:24px;font-family:'Bebas Neue',sans-serif;letter-spacing:.02em}
.card-sub{font-size:9px;color:var(--text3);margin-top:2px}
.c-green{color:var(--green2)}
.c-amber{color:var(--amber2)}
.c-blue{color:var(--blue2)}
.c-red{color:var(--red2)}
.c-gold{color:var(--gold)}
.btn{padding:9px 18px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:.15s;font-family:inherit}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:var(--green2)}
.btn-outline{background:transparent;border:1px solid rgba(255,255,255,0.13);color:var(--text)}
.btn-outline:hover{background:var(--bg3)}
.note{background:rgba(31,111,235,0.07);border-left:3px solid var(--blue2);padding:9px 14px;border-radius:0 6px 6px 0;font-size:11px;color:var(--text2);margin:10px 0;line-height:1.7}
.mode-banner{display:flex;align-items:center;gap:10px;padding:8px 28px;font-size:11px;font-weight:600;letter-spacing:.05em;background:rgba(46,160,67,0.08);border-bottom:1px solid rgba(46,160,67,0.2);color:var(--green2);margin-bottom:16px}
.mode-banner.manual{background:rgba(240,168,46,0.08);border-bottom-color:rgba(240,168,46,0.2);color:var(--amber2)}
.empty-state{text-align:center;padding:60px 20px;border:2px dashed rgba(255,255,255,0.08);border-radius:12px}
.empty-title{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--text2);letter-spacing:.05em;margin-bottom:8px}
.empty-desc{font-size:13px;color:var(--text3);line-height:1.7;max-width:480px;margin:0 auto}
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border);margin-bottom:12px}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--bg3)}
th{padding:8px 10px;text-align:left;font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
td{padding:8px 10px;border-top:1px solid var(--border);font-size:11px}
tbody tr:hover td{background:rgba(255,255,255,.02)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
label{display:block;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-top:10px;margin-bottom:4px}
select,input{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:6px;font-family:inherit;font-size:12px;width:100%;margin-bottom:8px}
select:focus,input:focus{outline:none;border-color:var(--gold)}
.stat-row{display:flex;justify-content:space-between;padding:8px;background:var(--bg3);border-radius:6px;margin-bottom:6px}
.stat-label{color:var(--text2);font-size:11px}
.stat-value{color:var(--gold);font-weight:600}
@media(max-width:1200px){.g3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:800px){.g2{grid-template-columns:1fr}.g3{grid-template-columns:1fr}}
@media(max-width:600px){.access-popup{padding:30px 20px}.access-popup h1{font-size:28px}.tier-boxes{grid-template-columns:1fr;gap:12px}.header{padding:10px 12px}.header-left{flex-direction:column;gap:8px}.header-right{flex-direction:column;gap:8px}.htitle-main{font-size:18px}.htitle-sub{font-size:9px}.nav{padding:0 10px}.ntab{padding:8px 10px;font-size:10px}.pane{padding:12px}.stitle{font-size:16px}.box{padding:10px}.cards{grid-template-columns:repeat(2,1fr)}.card-val{font-size:18px}.btn{padding:7px 14px;font-size:11px}table{font-size:9px}th{padding:5px 6px}td{padding:5px 6px}.legal-grid{grid-template-columns:1fr;margin:12px}.legal-card{max-height:400px}}
</style>
